<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Song Catalog | Dynotic Distribution</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Outfit",sans-serif;
}

/* BODY */
html, body{
  min-height:100vh;
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  color:#111;
  background:#f5f7fb;
  overflow-x:hidden;
  padding-top:70px;
}
tr{
  cursor:pointer;
}
/* ANIMATION */
@keyframes fadeSlideUp{
  0%{opacity:0; transform:translateY(30px);}
  100%{opacity:1; transform:translateY(0);}
}
#submitBtn:active{
  transform:scale(0.97);
}

.input:focus{
  border-color:#111;
  box-shadow:0 0 0 3px rgba(0,0,0,0.05);
}
/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  backdrop-filter:blur(6px);
  z-index:999;
  align-items:center;
  justify-content:center;
  animation:fadeIn .25s ease;
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

.modal-card{
  width:90%;
  max-width:420px;
  background:#fff;
  padding:22px;
  border-radius:20px;
  box-shadow:0 20px 50px rgba(0,0,0,.15);
  animation:scaleUp .25s ease;
}

@keyframes scaleUp{
  from{transform:scale(.9); opacity:0;}
  to{transform:scale(1); opacity:1;}
}

.modal-card h3{
  font-size:18px;
  margin-bottom:12px;
  font-weight:700;
}

/* BUTTON GROUP */
.btn-group{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.btn-group button{
  flex:1;
  padding:12px;
  border-radius:12px;
  font-weight:700;
  border:none;
  cursor:pointer;
  transition:.2s;
}

/* SUBMIT */
#submitBtn{
  background:#111;
  color:#fff;
}

#submitBtn:hover{
  transform:translateY(-1px);
  box-shadow:0 6px 15px rgba(0,0,0,.2);
}

/* CANCEL */
.cancel{
  background:#f3f4f6;
  color:#111;
}

.cancel:hover{
  background:#e5e7eb;
}
/* HEADER */
header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background:#fff;
  border-bottom:1px solid #e5e7eb;
  padding:12px 5%;
  z-index:100;
  display:flex;
  justify-content:center;
  font-size:clamp(1.8rem,4vw,2.5rem);
  font-weight:700;
  backdrop-filter:blur(10px);
  opacity:0;
}
.input{
  width:100%;
  padding:10px;
  border:1px solid #ddd;
  border-radius:10px;
  margin-bottom:8px;
}
/* SEARCH */
.filter-wrapper{
  width:95%;
  max-width:1200px;
  margin:10px auto;
  opacity:0;
}

.filter-box input{
  width:100%;
  padding:12px 14px;
  border-radius:12px;
  border:1px solid #ddd;
  background:#fff;
  color:#111;
  font-size:1rem;
  outline:none;
}

.filter-box input:focus{
  border-color:#111;
  box-shadow:0 0 0 3px rgba(0,0,0,0.05);
}

/* TABLE CARD */
.table-wrapper{
  width:95%;
  max-width:1200px;
  margin-top:15px;
  display:flex;
  flex-direction:column;
  background:#fff;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.06);
  padding:10px;
  opacity:0;
}

.table-scroll{
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:600px;
}

th, td{
  padding:14px 10px;
  border:1px solid #e5e7eb;
  text-align:center;
}

th{
  background:#f9fafb;
  font-weight:700;
}

tr:hover td{
  background:#f3f4f6;
}

/* NO RESULT */
.no-result{
  text-align:center;
  margin:15px;
  color:#e11d48;
  display:none;
}

/* PAGINATION */
.pagination{
  display:flex;
  justify-content:center;
  gap:12px;
  margin:10px 0;
  flex-wrap:wrap;
  opacity:0;
}

.pagination button{
  cursor:pointer;
  padding:8px 18px;
  border-radius:12px;
  background:#fff;
  color:#111;
  font-weight:600;
  border:1px solid #ddd;
  transition:0.25s;
}

.pagination button:hover{
  background:#111;
  color:#fff;
  transform:scale(1.05);
}

.pagination button:disabled{
  opacity:0.4;
  cursor:not-allowed;
  background:#f3f4f6;
}

/* MOBILE */
@media (max-width:992px){
  th,td{font-size:0.9rem; padding:10px 6px;}
}

@media (max-width:576px){
  th,td{font-size:0.8rem; padding:8px 4px;}
}
</style>
</head>

<body>

<header id="header">Song Catalog</header>

<div class="filter-wrapper" id="filterWrapper">
  <div class="filter-box">
    <input type="text" id="searchInput" placeholder="Search...">
  </div>
</div>

<div class="table-wrapper" id="tableWrapper">

  <div class="table-scroll">
    <table>
      <thead>
        <tr>
          <th>SONG ID</th>
          <th>JUDUL LAGU</th>
          <th>KOMPOSER</th>
          <th>PUBLISHER</th>
          <th>PERFORMER</th>
          <th>LINK</th>          
        </tr>
      </thead>
      <tbody id="transactionList"></tbody>
    </table>
  </div>

  <p class="no-result" id="noResult">tidak ditemukan.</p>

  <div class="pagination" id="pagination">
    <button id="prevBtn">Previous</button>
    <button id="nextBtn">Next</button>
  </div>

</div>
<!-- MODAL -->
<div id="modal" class="modal">

  <div class="modal-card">
    
    <h3>Pengajuan Cover</h3>

    <input id="m_songId" disabled class="input">
    <input id="m_title" disabled class="input">
    <input id="m_composer" disabled class="input">
    <input id="m_publisher" disabled class="input">
    <input id="m_performer" disabled class="input">

    <input id="m_email" class="input" placeholder="Email">
    <input id="m_cover" class="input" placeholder="Nama Pengcover">
    <input id="m_label" class="input" placeholder="Label">
    <input id="m_channel" class="input" placeholder="Channel YouTube">

    <div class="btn-group">
      <button id="submitBtn" onclick="submitRequest()">Submit</button>
      <button class="cancel" onclick="closeModal()">Cancel</button>
    </div>

  </div>
</div>

  
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyBRSkmZXbTPNupefSmjXvlKLDNsaeQ2zag",
  authDomain: "dynopay-2513c.firebaseapp.com",
  databaseURL: "https://dynopay-2513c-default-rtdb.asia-southeast1.firebasedatabase.app"
});
</script>
<script>
const itemsPerPage = 50;
let currentPage = 1;
let transactions = [];
let filteredTransactions = [];

const transactionList = document.getElementById('transactionList');
const searchInput = document.getElementById('searchInput');
const noResult = document.getElementById('noResult');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const header = document.getElementById('header');
const filterWrapper = document.getElementById('filterWrapper');
const tableWrapper = document.getElementById('tableWrapper');
const pagination = document.getElementById('pagination');

/* LOAD DATA */
async function loadData(){
  try{
    const sources = [
  "nagaswara.json",
      "mahar-pustaka.json",
      "18musik.json",
      "nadaku-musik.json",
      "royal-publikasi.json",
      "alfa-pustaka.json",
        "pustaka-cipta.json",
      "star-cipta.json",
      "sora-music.json",
      "pragita-prabawa.json",
      "sora-music.json",
  "proaktif-digital.json",
  "sony-music.json"
];

    const results = await Promise.all(
      sources.map(url => fetch(url).then(res => res.json()))
    );

    // gabung semua data
    const merged = results.flat();

    transactions = merged.map(item => ({
  songId: item["SONG ID"] || item["No"] || "-",
  title: item["JUDUL LAGU"] || item["Title"] || "-",
  composer: item["KOMPOSER"] || item["Composer"] || "-",
  publisher: item["PUBLISHER"] || "-",
  performer: item["PERFORMER"] || item["Singer"] || "-",
  youtube: item["LINK"] || item["YOUTUBE LINK REFERENCE"] || "-"
}));

    filteredTransactions = [...transactions];
    renderTransactions();

  }catch(err){
    console.error("Gagal load JSON:", err);
  }
}

/* RENDER */
function renderTransactions(){
  transactionList.innerHTML = '';

  const start = (currentPage-1)*itemsPerPage;
  const end = start + itemsPerPage;
  const pageItems = filteredTransactions.slice(start,end);

  noResult.style.display = pageItems.length===0 ? 'block' : 'none';

  pageItems.forEach((t,i)=>{
    const tr = document.createElement('tr');
    
tr.onclick = () => openModal(t);

    const yt = t.youtube === "-" 
  ? "-" 
  : `<a href="${t.youtube}" target="_blank" onclick="event.stopPropagation()" style="color:#2563eb;">Link</a>`;

    tr.innerHTML = `
  <td>${t.songId}</td>
  <td>${t.title}</td>
  <td>${t.composer}</td>
  <td>${t.publisher}</td>
  <td>${t.performer}</td>
  <td>${yt}</td>
`;

    tr.style.opacity = '0';
    tr.style.transform = 'translateY(20px)';
    tr.style.animation = `fadeSlideUp 0.5s ease ${(i*0.03)}s forwards`;

    transactionList.appendChild(tr);
  });

  prevBtn.disabled = currentPage===1;
  nextBtn.disabled = currentPage>=Math.ceil(filteredTransactions.length/itemsPerPage);
}

/* SEARCH */
searchInput.addEventListener('input',()=>{
  const q = searchInput.value.toLowerCase();

  filteredTransactions = transactions.filter(t =>
  t.title.toLowerCase().includes(q) ||
  t.performer.toLowerCase().includes(q) ||
  t.composer.toLowerCase().includes(q) ||
  t.publisher.toLowerCase().includes(q)
);

  currentPage = 1;
  renderTransactions();
});

/* PAGINATION */
prevBtn.onclick = ()=>{
  if(currentPage>1){
    currentPage--;
    renderTransactions();
  }
};

nextBtn.onclick = ()=>{
  if(currentPage < Math.ceil(filteredTransactions.length/itemsPerPage)){
    currentPage++;
    renderTransactions();
  }
};
function openModal(t){
  document.getElementById("modal").style.display = "flex";

  document.getElementById("m_songId").value = t.songId;
  document.getElementById("m_title").value = t.title;
  document.getElementById("m_composer").value = t.composer;
  document.getElementById("m_publisher").value = t.publisher;
  document.getElementById("m_performer").value = t.performer;
}
function closeModal(){
  document.getElementById("modal").style.display = "none";
}
function submitRequest(){
  const data = {
    songId: document.getElementById("m_songId").value,
    title: document.getElementById("m_title").value,
    composer: document.getElementById("m_composer").value,
    publisher: document.getElementById("m_publisher").value,
    performer: document.getElementById("m_performer").value,

    email: document.getElementById("m_email").value,
    cover: document.getElementById("m_cover").value,
    label: document.getElementById("m_label").value,
    channel: document.getElementById("m_channel").value,

    status: "proses",
    time: Date.now()
  };

  if(!data.email || !data.cover || !data.channel){
    alert("Isi data wajib");
    return;
  }
const btn = document.getElementById("submitBtn");
btn.disabled = true;
btn.innerHTML = "Processing...";
btn.style.opacity = "0.7";
  firebase.database().ref("coverRequests").push(data)
.then(()=>{
  btn.innerHTML = "Success ✓";
  btn.style.opacity = "1";

  document.getElementById("m_email").value = "";
  document.getElementById("m_cover").value = "";
  document.getElementById("m_label").value = "";
  document.getElementById("m_channel").value = "";

  // delay biar keliatan success
  setTimeout(()=>{
    closeModal();

    // reset button
    btn.disabled = false;
    btn.innerHTML = "Submit";
    btn.style.opacity = "1";
  }, 1200);
})

.catch(err=>{
  alert("Gagal: " + err.message);

  btn.disabled = false;
  btn.innerText = "Submit";
});
}
/* PAGE ANIMATION */
function triggerPageAnimation(){
  [header, filterWrapper, tableWrapper, pagination].forEach((el,i)=>{
    el.style.animation = 'none';
    void el.offsetHeight;
    el.style.animation = `fadeSlideUp 0.8s ease ${i*0.2}s forwards`;
  });
}

window.addEventListener('pageshow', triggerPageAnimation);

/* INIT */
loadData();
</script>

</body>
</html>
