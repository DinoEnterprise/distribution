<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request OAC | Dynotic</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Outfit",sans-serif}

body{
  background:#f1f2f7;
  color:#111;
  padding-top:74px;
}

/* HEADER */
header{
  padding:12px 20px;
  display:flex;
  align-items:center;
  background:#fff;
  border-bottom:1px solid #eee;
  position:fixed;
  top:0;
  width:100%;
  z-index:1000;
}

header img{height:50px}

/* CARD */
.card{
  width:90%;
  margin:20px auto;
  background:#fff;
  border-radius:20px;
  padding:22px;
  border:1px solid #ececec;
  box-shadow:0 8px 18px rgba(0,0,0,.05);
}

/* INPUT */
.input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-bottom:14px;
  font-size:14px;
  outline:none;
}

.input:focus{
  border-color:#111;
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:700;
  background:#111;
  color:#fff;
  cursor:pointer;
}

/* SUCCESS */
.success{
  text-align:center;
  font-size:14px;
  color:#16a34a;
}
</style>
</head>

<body>

<header>
  <img src="../assets/dynotic-distribution.png">
</header>

<div class="card">
  <div style="font-size:18px;font-weight:700;margin-bottom:10px">
    Request Official Artist Channel
  </div>

  <div style="font-size:13px;color:#666;margin-bottom:20px">
    Isi data dengan benar untuk pengajuan OAC ke YouTube
  </div>

 <input class="input" id="email" placeholder="Email">
<input class="input" id="artist" placeholder="Artist Name">
<input class="input" id="channel" placeholder="Channel ID (UCxxxx)">
<div style="font-size:11px;color:#888;margin-top:-8px;margin-bottom:10px">
  Gunakan Channel ID, bukan link (contoh: UCxxxx)
</div>
 
  <input class="input" id="label" placeholder="Label (optional)">

  <button onclick="submitOAC()">Submit Request</button>

  <div id="msg" style="margin-top:15px"></div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyBRSkmZXbTPNupefSmjXvlKLDNsaeQ2zag",
      authDomain: "dynopay-2513c.firebaseapp.com",
      databaseURL: "https://dynopay-2513c-default-rtdb.asia-southeast1.firebasedatabase.app"
    });

const db = firebase.database();

firebase.auth().onAuthStateChanged(user=>{
  if(!user) location.href="../login";
});

function isValidChannelID(id){
  return /^UC[a-zA-Z0-9_-]{20,30}$/.test(id);
}
function submitOAC(){
  const email = document.getElementById("email").value.trim();
const artist = document.getElementById("artist").value.trim();
const channel = document.getElementById("channel").value.trim().replace(/\s/g, "");
  const label = document.getElementById("label").value.trim();
  const msg = document.getElementById("msg");

  if(!email || !artist || !channel){
    msg.innerHTML = "<span style='color:red'>Isi data wajib dulu</span>";
    return;
  }
if(!isValidChannelID(channel)){
  msg.innerHTML = "<span style='color:red'>Channel ID harus format UCxxxx</span>";
  return;
}
  const user = firebase.auth().currentUser;
  if(!user) return;

  const data = {
  email,
  artist,
  channel,
  label,
    status: "pending",
    time: Date.now()
  };

  db.ref("oac/" + user.uid).set(data)
.then(()=>{
  msg.innerHTML = "<div class='success'>Request berhasil dikirim</div>";

  document.getElementById("email").value="";
  document.getElementById("artist").value="";
  document.getElementById("channel").value="";
  document.getElementById("label").value="";

  setTimeout(()=>{
    location.href = "../oac";
  }, 1200);
})
.catch(err=>{
  console.error(err);
  msg.innerHTML = "<span style='color:red'>Gagal kirim: " + err.message + "</span>";
});
}
</script>

</body>
</html>
