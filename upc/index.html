<!DOCTYPE html>
<html>
<head>
<title>UPC Generator</title>
</head>
<body>

<h2>UPC Generator</h2>

<input id="title" placeholder="Judul Lagu"><br><br>
<input id="artist" placeholder="Nama Artis"><br><br>

<button onclick="generate()">Generate UPC</button>

<h3 id="hasil">UPC akan muncul di sini</h3>

<button onclick="copyUPC()">Copy UPC</button>

<script>
let currentUPC = "";

function generate(){

  let base = "";

  // bikin 11 angka
  for(let i=0;i<11;i++){
    base += Math.floor(Math.random()*10);
  }

  let ganjil = 0;
  let genap = 0;

  // hitung checksum
  for(let i=0;i<base.length;i++){
    if(i%2==0) ganjil += parseInt(base[i]);
    else genap += parseInt(base[i]);
  }

  let total = (ganjil*3)+genap;
  let sisa = total % 10;
  let checksum = sisa==0 ? 0 : 10-sisa;

  currentUPC = base + checksum;

  document.getElementById("hasil").innerText = "UPC: " + currentUPC;
}

function copyUPC(){
  if(currentUPC == ""){
    alert("Generate dulu UPC nya!");
    return;
  }

  navigator.clipboard.writeText(currentUPC);
  alert("UPC berhasil di-copy!");
}
</script>

</body>
</html>
