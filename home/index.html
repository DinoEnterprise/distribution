  <style>
    /* Global Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Outfit", sans-serif;
    }

    body {
      background: #f1f2f7;
      min-height: 100vh;
      color: #111;
      animation: fadeIn .5s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      padding-top: 74px; /* space for fixed header */
    }
/* Tools Grid */
.tools-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}

/* Tool Item */
.tool-item {
  background: #f9fafb;
  border-radius: 14px;
  padding: 14px 10px;
  text-align: center;
  position: relative;
  transition: .2s;
}

.tool-item img {
  width: 34px;
  margin-bottom: 8px;
}

.tool-title {
  font-size: 12px;
  font-weight: 600;
  line-height: 1.3;
}

/* Coming Soon Badge */
.coming-badge {
  position: absolute;
  top: 6px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 8px;
  padding: 3px 6px;
  border-radius: 6px;
  background: #111;
  color: #fff;
  font-weight: 600;
}
    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounceIn {
      0% { transform: translateY(-20px); opacity: 0; }
      50% { transform: translateY(10px); opacity: 1; }
      70% { transform: translateY(-5px); }
      100% { transform: translateY(0); opacity: 1; }
    }

    /* Header */
    header {
      padding: 12px 20px;
      display: flex;
      align-items: center;
      background: #fff;
      border-bottom: 1px solid #eee;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
    }

    header img {
      height: 50px;
    }

    /* Notification Button */
    .notif-btn {
      margin-left: auto;
      position: relative;
      width: 50px;
      height: 50px;
    }

    .notif-btn img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .notif-badge {
      position: absolute;
      top: -4px;
      right: -6px;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 999px;
      background: #ef4444;
      color: #fff;
      display: none;
    }
.release-status.process {
  animation: pulse 1.2s infinite;
}
.release-item {
  display: flex;
  gap: 12px;
}

.release-cover {
  width: 46px;
  height: 46px;
  border-radius: 8px;
  background: #f1f2f7;
  flex-shrink: 0;
}

.release-cover img {
  width: 46px;
  height: 46px;
  object-fit: cover;
  border-radius: 6px;
}

.release-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
}

.release-title {
  flex: 1;
  font-weight: 600;
  font-size: 14px;
  line-height: 1.3;
}

.release-meta {
  font-size: 12px;
  color: #777;
  margin-top: 4px;
  line-height: 1.4;
}

.release-status {
  white-space: nowrap;
  flex-shrink: 0;
  font-size: 10px;
  padding: 4px 10px;
  border-radius: 999px;
  text-transform: uppercase;
}
@keyframes pulse {
  0%, 100% {
    transform: scale(1);
    opacity: 1;
  }
  50% {
    transform: scale(1.05);
    opacity: 0.8;
  }
}
    /* Message Popup */
    .message-popup {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.35);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .message-popup.show { display: flex; }

.message-card {
  width: 85%;
  max-width: 340px;
  background: #fff;
  border-radius: 16px;
  padding: 18px;
  /* animation: bounceIn .4s ease; */
}


    .message-title {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 8px;
    }

    .message-text {
      font-size: 13px;
      color: #555;
      line-height: 1.4;
    }

    .message-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 14px;
    }

    .view-btn {
      background: #667eea;
      color: #fff;
      border: none;
      padding: 8px 14px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
    }

    .close-btn {
      background: #eee;
      border: none;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
    }

    /* Cards */
.card {
  width: 90%;
  margin: 35px auto;
  background: #fff;
  border-radius: 20px;
  padding: 25px;
  border: 1px solid #ececec;
  box-shadow: 0 8px 18px rgba(0,0,0,.05);
  transition: .3s;
  /* animation: bounceIn .6s ease; */
}

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 22px rgba(0,0,0,.08);
    }

    .artist-name {
      font-size: 15px;
      font-weight: 500;
      color: #555;
      margin-bottom: 6px;
    }

    .balance-title {
      font-size: 15px;
      font-weight: 600;
      color: #222;
      margin-bottom: 10px;
    }

    .card-value {
      font-size: 33px;
      font-weight: 700;
      color: #111;
      margin-bottom: 15px;
    }

    /* Profile Menu */
    .profile-menu {
      position: fixed;
      bottom: 60px;
      right: 20px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,.12);
      display: none;
      width: 180px;
      z-index: 10;
      opacity: 0;
      transform: translateY(20px);
      transition: .25s ease;
    }

    .profile-menu.show {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    .profile-menu div {
      padding: 12px 14px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    .profile-menu div:last-child { border-bottom: none; }
    .profile-menu div:hover { background: #f1f2f7; }

    /* Clickable */
    .clickable {
      cursor: pointer;
      transition: .12s;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }

    .clickable:active {
      transform: scale(.94);
      filter: brightness(85%);
      box-shadow: inset 0 2px 6px rgba(0,0,0,.2);
    }

    /* Bottom Navigation */
    .bottom-nav {
      background: #fff;
      border-top: 1px solid #eee;
      padding: 10px 0;
      display: flex;
      justify-content: space-around;
      align-items: center;
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
    }

    .nav-item {
      text-align: center;
      font-size: 13px;
      opacity: .75;
      padding: 4px 14px;
      border-radius: 12px;
    }

    .nav-item img {
      width: 28px;
      display: block;
      margin: auto auto 4px;
    }

    .nav-item:hover { opacity: 1; }
  .nav-item.active {
  font-weight: 700;      /* teks jadi tebal */
  color: #111;           /* ganti jadi hitam */
  position: relative;
}

.nav-item.active::before {
  content: "";
  position: absolute;
  bottom: 0;             /* di bawah teks */
  left: 50%;
  transform: translateX(-50%);
  width: 40%;            /* lebar kotak */
  height: 4px;           /* tinggi kotak */
  border-radius: 8px;    /* biar agak bulat sudutnya */
  background-color: #111; /* warna kotak */
}
    .nav-item.active img { filter: brightness(1.2); }

    /* Buttons */
    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(90deg, #667eea, #764ba2);
      cursor: pointer;
    }

    button:hover { filter: brightness(90%); }
    button:active {
      filter: brightness(70%);
      transform: scale(.95);
    }

    /* Release Row */
    .release-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .release-title { max-width: 75%; line-height: 1.3; }
    .release-status { white-space: nowrap; flex-shrink: 0; }

  </style>
</head>

style="padding:10px 14px;border-radius:12px;background:#111;color:#fff;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;">

  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyBRSkmZXbTPNupefSmjXvlKLDNsaeQ2zag",
      authDomain: "dynopay-2513c.firebaseapp.com",
      databaseURL: "https://dynopay-2513c-default-rtdb.asia-southeast1.firebasedatabase.app"
    });

    const db = firebase.database();
    let targetSaldo = 0;

    firebase.auth().onAuthStateChanged(user => {
      if (!user) location.href = "../login";
      else {
        
        loadMessages(user.uid);

        db.ref("users/" + user.uid).once("value").then(snap => {
          if (snap.exists()) {
            const d = snap.val();
            targetSaldo = Number(d.saldo || 0);
            namaArtis.textContent = "Hi, " + (d.nama || "Artist");
            animateSaldo();
          }
        });
      }
    });

    function animateSaldo() {
      let angka = 0;
      const step = Math.ceil(targetSaldo / 15);
      const i = setInterval(() => {
        if (angka < targetSaldo) {
          angka += step;
          if (angka > targetSaldo) angka = targetSaldo;
          saldo.textContent = "Rp " + angka.toLocaleString("id-ID");
        } else clearInterval(i);
      }, 15);
    }

    function logout() { firebase.auth().signOut().then(() => location.href="../login"); }
    function goReleases() { location.href = "../releases"; }
    function accountClick() { location.href = "../account"; }
    function toggleProfileMenu() { profileMenu.classList.toggle("show"); }
    function homeClick() { console.log("Dashboard active — tidak reload"); }
    function goRekapan() { location.href = "../income"; }


    /* Messages */
    let messagesQueue=[], currentMsgIndex=0;

    function loadMessages(uid){
      db.ref("messages_inbox/"+uid).on("value", snap=>{
        messagesQueue=[];
        snap.forEach(i=>{ const m=i.val(); if(!m.read) messagesQueue.push({...m,key:i.key}); });
        notifBadge.style.display=messagesQueue.length>0?"block":"none";
        if(messagesQueue.length>0) notifBadge.textContent=messagesQueue.length;
      });
    }

    function openMessages(){ if(messagesQueue.length===0) return; currentMsgIndex=0; showCurrentMessage(); }
    function showCurrentMessage() {
  if(currentMsgIndex >= messagesQueue.length) {
    messagePopup.classList.remove("show");
    return;
  }
  const m = messagesQueue[currentMsgIndex];
  msgTitle.textContent = m.subject || "-";
  msgText.textContent = m.body || "-";
  messagePopup.style.display = 'flex';
  fadeInElement(document.querySelector('.message-card'), 250);
}

// Fungsi global untuk menutup pesan
function closeMessage() {
  const m = messagesQueue[currentMsgIndex];
  if(m) db.ref("messages_inbox/" + firebase.auth().currentUser.uid + "/" + m.key + "/read").set(true);
  currentMsgIndex++;
  showCurrentMessage();
}
function goOAC() {
  location.href = "../oac"; 
}

function goArtwork() {
  location.href = "../artwork-generate"; 
}
    function fadeInElement(el, duration = 350) {
  el.style.opacity = 0;
  el.style.transform = 'translateY(12px)';
  el.style.display = 'block';
  const start = performance.now();

  function animate(now) {
    const elapsed = now - start;
    const progress = Math.min(elapsed / duration, 1);
    el.style.opacity = progress;
    el.style.transform = `translateY(${12 * (1 - progress)}px)`;
    if(progress < 1) requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);
}

// Animasi untuk semua card saat load
window.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.card').forEach((c, idx) => {
    setTimeout(() => fadeInElement(c), idx * 100);
  });
});
    function viewMessage(){ const m=messagesQueue[currentMsgIndex]; db.ref("messages_inbox/"+firebase.auth().currentUser.uid+"/"+m.key+"/read").set(true); closeMessage(); }
  </script>
