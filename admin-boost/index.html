<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Admin Panel - Boost</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body {
  font-family: 'Outfit', sans-serif;
  background: #f1f2f7;
  margin: 0;
  padding: 15px;
}

h3 {
  font-size: 18px;
  margin-bottom: 10px;
}

.card {
  background: #fff;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 3px 10px rgba(0,0,0,.05);
}

input {
  width:100%;
  padding:8px;
  margin-bottom:10px;
  border-radius:6px;
  border:1px solid #ccc;
}

/* TABLE */
.table-container {
  overflow-x:auto;
  max-height:400px;
}

table {
  width:100%;
  border-collapse: collapse;
  font-size:13px;
}

th, td {
  padding:10px;
  border-bottom:1px solid #eee;
}

th {
  background:#f9f9f9;
  font-weight:600;
}

tr:hover {
  background:#f5f5f5;
}

/* BUTTON */
button.action-btn {
  background:#fff;
  border:1px solid #000;
  padding:6px 10px;
  font-size:12px;
  cursor:pointer;
}

button.action-btn:hover {
  background:#f0f0f0;
}

/* MENU */
.menu-wrap {
  position:relative;
}

.menu-btn {
  background:none;
  border:none;
  font-size:18px;
  cursor:pointer;
}

.menu-dropdown {
  display:none;
  position:absolute;
  right:0;
  background:#fff;
  border:1px solid #ddd;
  border-radius:8px;
  min-width:120px;
  box-shadow:0 4px 10px rgba(0,0,0,.1);
}

.menu-dropdown button {
  width:100%;
  border:none;
  background:none;
  padding:10px;
  text-align:left;
}

.menu-dropdown button:last-child {
  color:#ef4444;
}

.menu-dropdown button:hover {
  background:#f5f5f5;
}

/* PAGINATION */
.pagination {
  margin-top:10px;
  display:flex;
  justify-content:center;
  gap:10px;
}
</style>
</head>

<body>

<div class="card">
  <h3>Boost Submissions</h3>

  <input type="text" id="search" placeholder="Search artist / label">

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Artist</th>
          <th>Label</th>
          <th>Audio</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="pagination">
    <button id="prev">Prev</button>
    <span id="pageInfo"></span>
    <button id="next">Next</button>
  </div>
</div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyBRSkmZXbTPNupefSmjXvlKLDNsaeQ2zag",
  authDomain: "dynopay-2513c.firebaseapp.com",
  databaseURL: "https://dynopay-2513c-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db = firebase.database();
const auth = firebase.auth();

let dataAll = [];
let dataFiltered = [];
let page = 1;
const perPage = 10;

// 🔐 ADMIN CHECK
auth.onAuthStateChanged(user=>{
  if(!user){
    location.href="../admin";
    return;
  }

  db.ref("admins/"+user.uid).once("value").then(snap=>{
    if(!snap.exists()){
      alert("Bukan admin");
      auth.signOut();
      location.href="../admin";
    }
  });
});

// LOAD BOOST DATA
function loadData(){
  db.ref("boost_submissions").once("value").then(snap=>{
    let arr = [];

    snap.forEach(item=>{
      arr.push({
        id: item.key,
        ...item.val()
      });
    });

    arr.sort((a,b)=>(b.time||0)-(a.time||0));

    dataAll = arr;
    dataFiltered = arr;

    render();
  });
}

// RENDER TABLE
function render(){
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  const start = (page-1)*perPage;
  const list = dataFiltered.slice(start, start+perPage);

  list.forEach(d=>{
    tbody.innerHTML += `
<tr>
  <td>${d.artist || "-"}</td>
  <td>${d.label || "-"}</td>
  <td>
    <button class="action-btn" onclick="window.open('${d.audio}')">
      Open
    </button>
  </td>
  <td>
    <div class="menu-wrap">
      <button class="menu-btn" onclick="toggleMenu(this)">⋮</button>
      <div class="menu-dropdown">
        <button onclick="window.open('${d.audio}')">Play</button>
        <button onclick="deleteData('${d.id}')">Delete</button>
      </div>
    </div>
  </td>
</tr>
    `;
  });

  document.getElementById("pageInfo").innerText =
    `Page ${page} of ${Math.ceil(dataFiltered.length/perPage)}`;
}

// MENU
function toggleMenu(btn){
  document.querySelectorAll(".menu-dropdown").forEach(m=>{
    if(m!==btn.nextElementSibling){
      m.style.display="none";
    }
  });

  const menu = btn.nextElementSibling;
  menu.style.display = menu.style.display==="block" ? "none" : "block";
}

// DELETE
function deleteData(id){
  if(confirm("Hapus submission ini?")){
    db.ref("boost_submissions/"+id).remove().then(loadData);
  }
}

// SEARCH
document.getElementById("search").addEventListener("input", function(){
  const q = this.value.toLowerCase();

  dataFiltered = dataAll.filter(d =>
    (d.artist||"").toLowerCase().includes(q) ||
    (d.label||"").toLowerCase().includes(q)
  );

  page = 1;
  render();
});

// PAGINATION
document.getElementById("prev").onclick = ()=>{
  if(page>1){ page--; render(); }
};

document.getElementById("next").onclick = ()=>{
  if(page < Math.ceil(dataFiltered.length/perPage)){
    page++;
    render();
  }
};

loadData();
</script>

</body>
</html>
