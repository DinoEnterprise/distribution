<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Release Detail | Dynotic Distribution</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Outfit",sans-serif;}
body{background:#f1f2f7;color:#111;min-height:100vh;padding-top:74px;animation:fadeIn .5s ease;-webkit-tap-highlight-color:transparent;}
@keyframes fadeIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}

header{
  padding:12px 20px;
  display:flex;
  align-items:center;
  background:#fff;
  border-bottom:1px solid #eee;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:1000;
}
header img{height:50px;margin-right:10px;}
header h2{font-size:18px;color:#111;}
.cover-box{
  width: 160px;
  aspect-ratio: 1 / 1;
  border-radius: 14px;
  overflow: hidden;
  background: #ddd;
}
.action-group{
  display:flex;
  gap:8px;
  flex-wrap:wrap; /* biar turun kalau kepanjangan */
}

.btn{
  padding:8px 14px;
  border-radius:10px;
  border:1px solid #e5e7eb;
  background:#fff;
  font-size:13px;
  font-weight:500;
  color:#111;
  cursor:pointer;
  transition:.15s ease;
}

/* Hover */
.btn:hover{
  background:#f9fafb;
}

/* Klik (interaksi utama 🔥) */
.btn:active{
  transform:scale(.94);
  background:#f3f4f6;
}

/* Variasi warna */
.btn.danger{
  border-color:#ef4444;
  color:#ef4444;
}

.btn.danger:hover{
  background:#fee2e2;
}

.btn.warning{
  border-color:#f59e0b;
  color:#f59e0b;
}

.btn.warning:hover{
  background:#fef3c7;
}
.field-title{
  font-weight:600;
  color:#111;
}

.field-value{
  color:#777;
  font-weight:400;
}
.cover-box img{
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.card{
  width:90%;
  margin:15px auto;
  background:#fff;
  border-radius:20px;
  padding:20px;
  border:1px solid #ececec;
  box-shadow:0 8px 18px rgba(0,0,0,.05);
  opacity:0;
  animation:fadeSlideIn 0.5s ease forwards;
}

@keyframes fadeSlideIn{
  from{
    opacity:0;
    transform:translateY(4px); /* geser sedikit, halus */
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}
.status-badge{
  display:inline-block;
  padding:6px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
  margin-top:6px;
}
.release-header{display:flex;gap:15px;align-items:center;margin-bottom:15px;}
.release-header img{
  filter: blur(10px);
  opacity: .6;
  transition: filter .35s ease, opacity .35s ease;
}
.release-header img.loaded{
  filter: blur(0);
  opacity: 1;
}
.release-info{flex:1;}
.release-info div{margin-bottom:6px;}
.release-info .title{font-weight:700;font-size:18px;}
.release-info .artist,.release-info .label,.release-info .genre,.release-info .date,.release-info .status{font-size:14px;color:#555;}

.platform-list{margin-top:15px;}
.platform-item{
  transition:.2s;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 12px;
  border-bottom:1px solid #eee;
}
.platform-item:hover{
  background:#f5f5f5;
  border-radius:10px;
}
.platform-item img{width:28px;height:28px;margin-right:8px;border-radius:6px;}
.platform-item b{flex:1;font-size:14px;}
.platform-status{
  font-size:12px;
  font-weight:600;
  padding:4px 10px;
  border-radius:999px;
  border:1px solid #f59e0b;
  color:#f59e0b;
}

.clickable{cursor:pointer;transition:.12s;}
.clickable:active{transform:scale(.96);filter:brightness(85%);}
@media (max-width:600px){
  .cover-box{ width:130px; }
}

</style>
</head>
<body>

<header>
  <img src="../assets/dynotic-distribution.png" alt="DynoPay Logo">
</header>
<div class="card">
  <div style="font-weight:700;margin-bottom:12px;">Actions</div>

  <div class="action-group">
    <button id="editBtn" class="btn">Edit Release</button>

    <button id="deleteBtn" class="btn danger" style="display:none;">
      Delete
    </button>

    <button id="takedownBtn" class="btn warning" style="display:none;">
      Request Takedown
    </button>
  </div>
</div>
<div id="popup" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.4);
display:none;
align-items:center;
justify-content:center;
z-index:2000;
">

  <div style="
  background:#fff;
  padding:20px;
  border-radius:16px;
  width:85%;
  max-width:320px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
  animation:fadeIn .2s ease;
  ">

    <div id="popupText" style="font-weight:600;margin-bottom:15px;">
      Are you sure?
    </div>

    <div style="display:flex;gap:8px;justify-content:center;">
      <button onclick="closePopup()" class="btn">Cancel</button>
      <button onclick="confirmDelete()" class="btn danger">Delete</button>
    </div>

  </div>
</div>
<div id="toast" style="
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#111;
color:#fff;
padding:10px 16px;
border-radius:999px;
font-size:13px;
display:none;
z-index:3000;
">
Success
</div>
<div class="card">
 <div class="release-header">
  <div class="cover-box">
    <img id="coverArt" src="../assets/profile.png" alt="Cover Art">
  </div>
  <div class="release-info">
      <div class="title" id="releaseTitle">Loading...</div>
      <div class="artist" id="releaseArtist">--</div>
<div class="label">
  <span class="field-title">Label:</span>
  <span class="field-value" id="releaseLabel">-</span>
</div>

<div class="ean">
  <span class="field-title">UPC:</span>
  <span class="field-value" id="releaseEAN" onclick="copyEAN()" style="cursor:pointer">-</span>
</div>

<div class="genre">
  <span class="field-title">Genre:</span>
  <span class="field-value" id="releaseGenre">-</span>
</div>

<div class="date">
  <span class="field-title">Release Date:</span>
  <span class="field-value" id="releaseDate">-</span>
</div>

<div class="status">
  <span class="field-title">Status:</span>
  <span class="field-value" id="releaseStatus">-</span>
</div>
    </div>
  </div>
</div>

<div class="card">
  <div style="font-weight:700;margin-bottom:10px;">Platforms</div>
  <div id="platformList" class="platform-list"></div>
</div>
<div class="card">
  <div style="font-weight:700;margin-bottom:10px;">Smartlink</div>

  <input id="smartlinkInput" 
  readonly
  placeholder="Smartlink not available"
  style="display:none;width:100%;padding:10px;border-radius:10px;border:1px solid #ddd;margin-bottom:10px;">

<button id="openBtn"
  onclick="openSmartlink()"
  style="display:none;margin-top:8px;width:100%;padding:12px;border-radius:12px;border:1px solid #ddd;background:#fff;">
  Open Smartlink
</button>


  <div id="emptySmartlink"
  style="font-size:13px;color:#888;text-align:center;">
  Smartlink not available
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
 apiKey:"AIzaSyBRSkmZXbTPNupefSmjXvlKLDNsaeQ2zag",
 authDomain:"dynopay-2513c.firebaseapp.com",
 databaseURL:"https://dynopay-2513c-default-rtdb.asia-southeast1.firebasedatabase.app"
});
const db = firebase.database();
const params = new URLSearchParams(location.search);
let uid;
const rid = params.get("rid");

const platformIcons = {
  "Spotify": "../assets/spotify.png",
  "Tidal": "../assets/tidal.png",
  "Amazon": "../assets/amazon.png",
  "Apple Music": "../assets/apple.png",
  "Tiktok": "../assets/tiktok.png",
  "YouTube Music": "../assets/youtube.png",
  "YouTube Content ID": "../assets/contentid.png",
  "META": "../assets/meta.png",
  "SoundCloud": "../assets/soundcloud.png",
  "Tencent": "../assets/tencent.png"
};
const platforms = ["Spotify","Tidal","Amazon","Apple Music","Tiktok","YouTube Music","YouTube Content ID","META","SoundCloud","Tencent"];

    firebase.auth().onAuthStateChanged(user => {
  if (!user) {
    location.href = "../login";
  } else {
    uid = user.uid; // ⬅️ isi ke global
    loadRelease(uid, rid);
  }
});

function loadRelease(uid, rid){
  db.ref(`releases/${uid}/${rid}`).once("value").then(snap=>{
    const d = snap.val();
    if(!d){ 
      alert("Rilisan tidak ditemukan"); 
      return; 
    }
    
const statusLower = (d.status || "pending").toLowerCase();
    document.getElementById("releaseTitle").innerText = d.title || "-";
    document.getElementById("releaseArtist").innerText = d.artist || "-";
  document.getElementById("releaseLabel").innerText = d.label || "-";
document.getElementById("releaseEAN").innerText = d.ean || "-";
document.getElementById("releaseGenre").innerText = d.genre || "-";
const date = d.date ? new Date(d.date) : null;

document.getElementById("releaseDate").innerText =
  date ? date.toLocaleDateString("en-US", {
    year: "numeric",
    month: "long",
    day: "numeric"
  }) : "-";
const statusEl = document.getElementById("releaseStatus");

let text = "PROCESS";
let color = "#3b82f6";

const now = new Date();
const releaseDateObj = d.date ? new Date(d.date) : null;

if(d.status === "approved"){
  if(releaseDateObj && now >= releaseDateObj){
    text = "LIVE";
    color = "#22c55e";
  } else {
    text = "APPROVED";
    color = "#10b981";
  }
}

if(d.status === "rejected"){
  text = "REJECTED";
  color = "#ef4444";
}

statusEl.innerHTML = `
  <span class="status-badge" 
    style="border:1px solid ${color};color:${color}">
    ${text}
  </span>
`;
// === ACTION BUTTON LOGIC ===
const deleteBtn = document.getElementById("deleteBtn");
const takedownBtn = document.getElementById("takedownBtn");
const editBtn = document.getElementById("editBtn");

editBtn.onclick = editRelease;
deleteBtn.onclick = deleteRelease;
takedownBtn.onclick = takedownRelease;

const isLive = releaseDateObj && now >= releaseDateObj;

// DELETE → process & rejected
if(statusLower === "pending" || statusLower === "rejected"){
  deleteBtn.style.display = "block";
}

// TAKEDOWN → approved & live
if(statusLower === "approved" || isLive){
  takedownBtn.style.display = "block";
}

// EDIT → hide saat approved & live
if(statusLower === "approved" || isLive){
  editBtn.style.display = "none";
}
    const cover = document.getElementById("coverArt");

if (d.cover) {
  cover.src = d.cover.trim();
} else {
  cover.src = "../assets/cover-default.png";
}

cover.onload = () => cover.classList.add("loaded");
cover.onerror = () => {
  cover.src = "../assets/cover-default.png";
  cover.classList.add("loaded");
};
const input = document.getElementById("smartlinkInput");
const openBtn = document.getElementById("openBtn");
const empty = document.getElementById("emptySmartlink");

if(d.smartlink && d.smartlink.trim() !== ""){
  input.style.display = "block";
  openBtn.style.display = "block";
  empty.style.display = "none";
  input.value = d.smartlink.trim();
} else {
  input.style.display = "none";
  openBtn.style.display = "none";
  empty.style.display = "block";
}

if(statusLower === "approved" || statusLower === "live"){
  renderPlatforms(d.platformStatus||{});
} else {
  // pending atau rejected
  document.getElementById("platformList").innerHTML = "<div style='color:#888;font-size:13px;text-align:center;'>Platform not available</div>";
}
  });
}
function copyEAN(){
  const val = document.getElementById("releaseEAN").innerText;
  navigator.clipboard.writeText(val);

  const el = document.getElementById("releaseEAN");
  const old = el.innerText;

  el.innerText = "Copied";
  setTimeout(()=>{
    el.innerText = old;
  }, 1500);
}
function editRelease(){
  location.href = "../edit-release?rid=" + rid;
}

function deleteRelease(){
  document.getElementById("popup").style.display = "flex";
  document.getElementById("popupText").innerText = "Delete this release?";
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
}

function confirmDelete(){
  db.ref(`releases/${uid}/${rid}`).remove().then(()=>{
    closePopup();
    showToast("Release deleted");

    setTimeout(()=>{
      location.href = "../releases";
    }, 800);
  });
}
function openSmartlink(){
  const link = document.getElementById("smartlinkInput").value;
  if(link) window.open(link, "_blank");
}
function takedownRelease(){
  const title = document.getElementById("releaseTitle").innerText;
  const artist = document.getElementById("releaseArtist").innerText;
  const ean = document.getElementById("releaseEAN").innerText;

  const subject = encodeURIComponent("Request Takedown Release");
  const body = encodeURIComponent(
  `Hello Dynotic Admin,\n\nI would like to request a takedown for the following release:\n\nTitle: ${title}\nArtist: ${artist}\nUPC: ${ean}\nI would appreciate your assistance.\n\nThank you.`
);

  window.location.href = `mailto:admin@dynotic.web.id?subject=${subject}&body=${body}`;
}
function showToast(text){
  const toast = document.getElementById("toast");
  toast.innerText = text;
  toast.style.display = "block";

  setTimeout(()=>{
    toast.style.display = "none";
  }, 2000);
}
function renderPlatforms(data){
  const wrap = document.getElementById("platformList");
  wrap.innerHTML = "";
  platforms.forEach(p=>{
    let st = data[p]; // jangan default ke 'process'
    if(!st) return; // jika platform tidak ada, skip

    let color = "#f59e0b";
    if(st==="approved") color="#10b981";
    if(st==="unavailable") color="#ef4444";

    wrap.innerHTML += `
      <div class="platform-item clickable">
        <img src="${platformIcons[p]}" alt="${p} Logo">
        <b>${p}</b>
        <div class="platform-status" style="border-color:${color};color:${color};">${st.toUpperCase()}</div>
      </div>`;
  });
}
</script>
</body>
</html>
