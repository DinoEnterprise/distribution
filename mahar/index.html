<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahar Pustaka Nusantara - Dynotic</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Outfit",sans-serif;
}

body{
  min-height:100vh;
  background:#f5f7fb;
  color:#111;
  padding-top:70px;
}

/* ANIMATION */
@keyframes fadeSlideUp {
  0%{opacity:0; transform:translateY(30px);}
  100%{opacity:1; transform:translateY(0);}
}

/* HEADER */
header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background:#fff;
  border-bottom:1px solid #e5e7eb;
  padding:12px 5%;
  text-align:center;
  font-size:clamp(1.6rem,4vw,2.2rem);
  font-weight:700;
  z-index:100;
  opacity:0;
}

/* SEARCH */
.filter-wrapper{
  width:95%;
  max-width:1200px;
  margin:15px auto;
  opacity:0;
}

.filter-box input{
  width:100%;
  padding:12px 14px;
  border-radius:12px;
  border:1px solid #ddd;
  background:#fff;
  font-size:14px;
}

.filter-box input:focus{
  outline:none;
  border-color:#111;
  box-shadow:0 0 0 3px rgba(0,0,0,0.05);
}

/* TABLE */
.table-wrapper{
  width:95%;
  max-width:1200px;
  margin:auto;
  opacity:0;
}

.table-scroll{
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  border-radius:14px;
  overflow:hidden;
}

th,td{
  padding:12px;
  border-bottom:1px solid #eee;
  text-align:center;
}

th{
  background:#f9fafb;
  font-weight:600;
}

tr:hover td{
  background:#f3f4f6;
}

/* NO RESULT */
.no-result{
  text-align:center;
  margin-top:12px;
  color:#999;
  display:none;
}

/* PAGINATION */
.pagination{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:15px 0;
  opacity:0;
}

.pagination button{
  padding:8px 16px;
  border-radius:10px;
  border:1px solid #ddd;
  background:#fff;
  cursor:pointer;
  transition:0.25s;
}

.pagination button:hover{
  background:#111;
  color:#fff;
}

.pagination button:disabled{
  opacity:0.4;
  cursor:not-allowed;
  background:#f3f4f6;
}

/* MOBILE */
@media(max-width:600px){
  th,td{font-size:12px; padding:8px;}
}
</style>
</head>

<body>

<header id="header">Mahar Pustaka Nusantara</header>

<div class="filter-wrapper" id="filterWrapper">
  <div class="filter-box">
    <input type="text" id="searchInput" placeholder="Cari Title, Singer, Composer...">
  </div>
</div>

<div class="table-wrapper" id="tableWrapper">
  <div class="table-scroll">
    <table>
      <thead>
        <tr>
          <th>No</th>
          <th>Title</th>
          <th>Singer</th>
          <th>Composer</th>
          <th>YouTube</th>
        </tr>
      </thead>
      <tbody id="transactionList"></tbody>
    </table>
  </div>

  <p class="no-result" id="noResult">Data tidak ditemukan</p>

  <div class="pagination" id="pagination">
    <button id="prevBtn">Previous</button>
    <button id="nextBtn">Next</button>
  </div>
</div>

<script>
const itemsPerPage = 50;
let currentPage = 1;
let transactions = [];
let filteredTransactions = [];

const transactionList = document.getElementById('transactionList');
const searchInput = document.getElementById('searchInput');
const noResult = document.getElementById('noResult');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const header = document.getElementById('header');
const filterWrapper = document.getElementById('filterWrapper');
const tableWrapper = document.getElementById('tableWrapper');
const pagination = document.getElementById('pagination');

async function loadData(){
  try{
    const res = await fetch('mpn.json');
    const data = await res.json();

    transactions = data.map(item => ({
      no: item["No"] || "-",
      title: item["Title"] || "-",
      singer: item["Singer"] || "-",
      composer: item["Composer"] || "-",
      youtube: item["Youtube link (if Any)"] || "-"
    }));

    filteredTransactions = [...transactions];
    renderTransactions();
  }catch(e){
    console.error("Gagal load JSON", e);
  }
}

function renderTransactions(){
  transactionList.innerHTML = '';

  const start = (currentPage-1)*itemsPerPage;
  const pageItems = filteredTransactions.slice(start, start+itemsPerPage);

  noResult.style.display = pageItems.length ? 'none':'block';

  pageItems.forEach((t,i)=>{
    const tr = document.createElement('tr');

    const yt = t.youtube === "-"
      ? "-"
      : `<a href="${t.youtube}" target="_blank" style="color:#2563eb;">Link</a>`;

    tr.innerHTML = `
      <td>${t.no}</td>
      <td>${t.title}</td>
      <td>${t.singer}</td>
      <td>${t.composer}</td>
      <td>${yt}</td>
    `;

    tr.style.animation = `fadeSlideUp 0.4s ease ${(i*0.02)}s forwards`;
    transactionList.appendChild(tr);
  });

  prevBtn.disabled = currentPage===1;
  nextBtn.disabled = currentPage >= Math.ceil(filteredTransactions.length/itemsPerPage);
}

searchInput.addEventListener('input',()=>{
  const q = searchInput.value.toLowerCase();

  filteredTransactions = transactions.filter(t =>
    t.title.toLowerCase().includes(q) ||
    t.singer.toLowerCase().includes(q) ||
    t.composer.toLowerCase().includes(q)
  );

  currentPage = 1;
  renderTransactions();
});

prevBtn.onclick = ()=>{ currentPage--; renderTransactions(); };
nextBtn.onclick = ()=>{ currentPage++; renderTransactions(); };

function animatePage(){
  [header, filterWrapper, tableWrapper, pagination].forEach((el,i)=>{
    el.style.animation = `fadeSlideUp 0.6s ease ${i*0.1}s forwards`;
  });
}

window.addEventListener('load', ()=>{
  animatePage();
  loadData();
});
</script>

</body>
</html>
