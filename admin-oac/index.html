<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin OAC - Dynotic</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body {
  font-family: 'Outfit', sans-serif;
  background: #f1f2f7;
  margin: 0;
  padding: 15px;
}

h3 {
  font-size: 18px;
  margin-bottom: 10px;
}

.card {
  background: #fff;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 3px 10px rgba(0,0,0,.05);
}

.table-container {
  overflow-x: auto;
  max-height: 400px;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

th, td {
  padding: 8px;
  border-bottom: 1px solid #eee;
}

th {
  background: #f9f9f9;
}

.status-badge {
  padding: 3px 8px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
}

.menu-wrap {
  position: relative;
}

.menu-btn {
  border: none;
  background: none;
  font-size: 18px;
  cursor: pointer;
}

.menu-dropdown {
  display: none;
  position: absolute;
  right: 0;
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 8px;
  min-width: 120px;
  z-index: 99;
}

.menu-dropdown button {
  width: 100%;
  border: none;
  background: none;
  padding: 10px;
  text-align: left;
  cursor: pointer;
}

.menu-dropdown button:hover {
  background: #f5f5f5;
}
</style>
</head>

<body>

<div class="card">
  <h3>OAC Requests</h3>

  <input type="text" id="search" placeholder="Search artist / channel"
  style="width:100%;padding:8px;margin-bottom:10px;border-radius:6px;border:1px solid #ccc">

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Artist</th>
          <th>Channel</th>
          <th>Status</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>

// ✅ INIT FIREBASE (ANTI DOUBLE)
if (!firebase.apps.length) {
  firebase.initializeApp({
    apiKey: "AIzaSyBRSkmZXbTPNupefSmjXvlKLDNsaeQ2zag",
    authDomain: "dynopay-2513c.firebaseapp.com",
    databaseURL: "https://dynopay-2513c-default-rtdb.asia-southeast1.firebasedatabase.app"
  });
}

const db = firebase.database();
const auth = firebase.auth();

let allData = [];
let filtered = [];

// ✅ AUTH (ANTI LOGOUT)
auth.onAuthStateChanged(user => {
  if(user){
    console.log("LOGIN:", user.uid);
    checkAdmin(user.uid);
  } else {
    console.log("Menunggu session...");
  }
});

function checkAdmin(uid){
  db.ref("admins/"+uid).once("value").then(snap=>{
    if(!snap.exists()){
      alert("⚠ Kamu bukan admin!");
      auth.signOut();
    } else {
      console.log("ADMIN VALID");
      loadOAC();
    }
  });
}

// 🎨 warna status
function getColor(status){
  if(status=="approved") return "#22c55e";
  if(status=="rejected") return "#ef4444";
  if(status=="review") return "#3b82f6";
  return "#f59e0b";
}

// menu toggle
function toggleMenu(btn){
  document.querySelectorAll(".menu-dropdown").forEach(m=>{
    if(m!==btn.nextElementSibling){
      m.style.display="none";
    }
  });

  const menu = btn.nextElementSibling;
  menu.style.display = menu.style.display==="block" ? "none" : "block";
}

// update status
function setStatus(uid,id,status){
  let text = "";

  if(status=="approved") text="Approve request ini?";
  else if(status=="rejected") text="⚠ Reject request?";
  else text="Set ke review?";

  if(!confirm(text)) return;

  db.ref(`oac/${uid}/${id}/status`).set(status).then(()=>{
    console.log("STATUS UPDATED");

    const item = allData.find(x=>x.uid===uid && x.id===id);
    if(item) item.status = status;

    const f = filtered.find(x=>x.uid===uid && x.id===id);
    if(f) f.status = status;

    render();
  });
}

// 🔥 LOAD REALTIME (FIX UTAMA)
function loadOAC(){
  console.log("LOAD OAC JALAN");

  db.ref("oac").on("value", snap => {

    let arr = [];

    if(!snap.exists()){
      console.log("OAC kosong");
      document.getElementById("tbody").innerHTML =
        `<tr><td colspan="4">Belum ada request</td></tr>`;
      return;
    }

    snap.forEach(userSnap=>{
      userSnap.forEach(req=>{
        const val = req.val();

        if(val){
          arr.push({
            uid: userSnap.key,
            id: req.key,
            ...val
          });
        }
      });
    });

    console.log("DATA MASUK:", arr);

    arr.sort((a,b)=>(b.time||0)-(a.time||0));

    allData = arr;
    filtered = arr;

    render();
  });
}

// render table
function render(){
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  if(filtered.length === 0){
    tbody.innerHTML = `<tr><td colspan="4">Tidak ada data</td></tr>`;
    return;
  }

  filtered.forEach(d=>{
    tbody.innerHTML += `
<tr>
  <td>${d.artist || "-"}</td>
  <td>${d.channel || "-"}</td>
  <td>
    <span class="status-badge"
    style="border:1px solid ${getColor(d.status)};
    color:${getColor(d.status)}">
    ${(d.status || "pending").toUpperCase()}
    </span>
  </td>

  <td>
    <div class="menu-wrap">
      <button class="menu-btn" onclick="toggleMenu(this)">⋮</button>

      <div class="menu-dropdown">
        <button onclick="setStatus('${d.uid}','${d.id}','review')">Review</button>
        <button onclick="setStatus('${d.uid}','${d.id}','approved')">Approve</button>
        <button onclick="setStatus('${d.uid}','${d.id}','rejected')">Reject</button>
      </div>
    </div>
  </td>
</tr>
    `;
  });
}

// search
document.getElementById("search").addEventListener("input", function(){
  const q = this.value.toLowerCase();

  filtered = allData.filter(d =>
    (d.artist||"").toLowerCase().includes(q) ||
    (d.channel||"").toLowerCase().includes(q)
  );

  render();
});

</script>

</body>
</html>
