<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Income | Dynotic Distribution</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background: #f1f2f7;
      padding-top: 74px;
    }

    header {
      padding: 12px 20px;
      display: flex;
      align-items: center;
      background: #fff;
      border-bottom: 1px solid #eee;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
    }

    header img {
      height: 50px;
    }
td.action-cell{
  text-align: center;
  vertical-align: middle;
}

.action-btn{
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;

  background: #f5f6fa;
  border: 1px solid #e6e8ef;
  transition: 0.2s;
}

.action-btn:hover{
  background: #e9ecf5;
  transform: scale(1.02);
}

.action-btn img{
  width: 18px;
  height: 18px;
}
    /* Card Total & Withdraw */
    .card {
      width: 90%;
      margin: 16px auto;
      background: #fff;
      border-radius: 18px;
      padding: 18px;
      border: 1px solid #ececec;
      box-shadow: 0 6px 16px rgba(0, 0, 0, .05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card .balance {
      font-weight: 700;
      font-size: 16px;
    }

    .card button {
      padding: 8px 14px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
.download-icon {
  height: 28px; /* atau 28px */
  cursor: pointer;
}
.table-wrapper{
  width:95%;
  max-width:1200px;
  margin:16px auto;
  background:#fff;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.06);
  padding:10px;
}

.table-scroll{
  overflow-x:auto;
  -webkit-overflow-scrolling: touch;
}

table{
  width:100%;
  min-width:800px;
  border-collapse:collapse;
}

th, td{
  white-space: nowrap;
}
    /* Table (hidden for normal users) */
    .table-card {
  display: block; /* tampilkan tabel untuk user */
  width: 90%;
  margin: 16px auto;
      background: #fff;
      border-radius: 18px;
      padding: 0;
      border: 1px solid #ececec;
      box-shadow: 0 6px 16px rgba(0, 0, 0, .05);
    }

   .table-card table {
  width: 100%;
  border-collapse: separate; /* ubah dari collapse */
  border-spacing: 0;
}

/* ROW */
.table-card tr {
  transition: 0.2s;
}

.table-card tr:hover {
  background: #f9fafb;
}

/* CELL */
.table-card th,
.table-card td {
  padding: 12px 14px;
  text-align: left;
  border-bottom: 1px solid #eee;
  font-size: 14px;
  vertical-align: middle;
}

.table-card th {
  background: #f9f9f9;
  font-weight: 600;
}

/* BUTTON */
.table-card td button {
  padding: 6px 10px;
  background: #667eea;
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
}

.table-card td button:hover {
  filter: brightness(0.9);
}

/* STATUS BADGE */
.status {
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  display: inline-block;
}

.status.accepted {
  background: #dcfce7;
  color: #166534;
}

.status.paid {
  background: #dbeafe;
  color: #1e40af;
}

.status.pending {
  background: #fef3c7;
  color: #92400e;
}

  </style>
</head>
<body>

  <header>
    <img src="../assets/dynotic-distribution.png" alt="DynoPay">
  </header>

  <!-- Card Total + Withdraw -->
<div class="card">
  <div class="balance" id="totalBalance">Total: Rp 0</div>
</div>

  <!-- Table Income (Hidden for admin) -->
  <div class="table-card">
  <div class="table-wrapper">
    <div class="table-scroll">

      <table>
        <thead>
          <tr>
            <th>REPORT</th>
            <th>PERIOD</th>
            <th>GENERATED</th>
            <th>VALUE</th>
            <th>STATUS</th>
            <th>ACTION</th>
          </tr>
        </thead>

        <tbody id="incomeList">
          <!-- Data Firebase -->
        </tbody>

      </table>

    </div>
  </div>
</div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyBRSkmZXbTPNupefSmjXvlKLDNsaeQ2zag",
      authDomain: "dynopay-2513c.firebaseapp.com",
      databaseURL: "https://dynopay-2513c-default-rtdb.asia-southeast1.firebasedatabase.app"
    });

    const db = firebase.database();

    firebase.auth().onAuthStateChanged(user => {
  if (!user) window.location.href = "../login";
  else {
    const uid = user.uid;

    // Ambil saldo
    db.ref("users/" + uid + "/saldo").once("value").then(snap => {
  const saldo = Number(snap.val() || 0);
  document.getElementById("totalBalance").innerText =
    "Total: Rp " + saldo.toLocaleString("id-ID");
});

    // Panggil loadIncome
    loadIncome(uid, user.email);
  }
});

// Fungsi loadIncome di sini, di luar auth
function loadIncome(uid, email) {
  const incomeList = document.getElementById("incomeList");
  incomeList.innerHTML = "";

  db.ref("royalties").once("value").then(snap => {
    if (!snap.exists()) {
      incomeList.innerHTML = `<tr><td colspan="6">Belum ada laporan</td></tr>`;
      return;
    }

    let rows = "";

    let dataArray = [];

snap.forEach(item => {
  const val = item.val();

  // 🔥 FILTER DI SINI (lebih efisien & rapi)
  if ((val.uid && val.uid === uid) || (val.email && val.email === email)) {
    dataArray.push({
      key: item.key,
      ...val
    });
  }
});

// 🔥 terbaru di atas
dataArray.sort((a, b) => b.key.localeCompare(a.key));

dataArray.forEach(d => {
  const key = d.key;

  let statusText = "";
  let icon = "";

  if (d.type === "Sales Report") {
    statusText = "Accepted";
    icon = "../assets/report.png";
  } else if (d.type === "Payment") {
    statusText = "Paid";
    icon = "../assets/invoice.png";
  } else {
    statusText = "Pending";
  }

  rows += `
<tr>
  <td>${d.type || "-"}</td>
  <td>${d.period || "-"}</td>
  <td>${d.date || "-"}</td>
  <td>Rp ${Number(d.value || 0).toLocaleString("id-ID")}</td>
  <td>
    <span class="status ${
      statusText === "Accepted" ? "accepted" :
      statusText === "Paid" ? "paid" : "pending"
    }">
      ${statusText}
    </span>
  </td>
  
<td class="action-cell">
  ${
    d.type === "Payment"
      ? `<div class="action-btn" onclick="window.open('../invoice?id=${key}','_blank')">
           <img src="../assets/invoice.png">
           My Invoice
         </div>`
      : d.type === "Sales Report" && d.downloadUrl
        ? `<div class="action-btn" onclick="downloadFile('${d.downloadUrl}')">
             <img src="../assets/report.png">
             Report
           </div>`
        : '-'
  }
</td>
</tr>
`;
});

    incomeList.innerHTML = rows;
  });
}
   

function downloadFile(url){
  const a = document.createElement("a");
  a.href = url;
  a.download = "";
  a.target = "_blank";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}
  </script>
</body>
</html>
