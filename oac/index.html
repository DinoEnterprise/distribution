<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OAC | Dynotic Distribution</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Outfit",sans-serif}

body{
  background:#f1f2f7;
  color:#111;
  padding-top:74px;
}

/* HEADER */
header{
  padding:12px 20px;
  display:flex;
  align-items:center;
  background:#fff;
  border-bottom:1px solid #eee;
  position:fixed;
  top:0;
  width:100%;
  z-index:1000;
}

header img{height:50px}

/* CARD */
.card{
  width:90%;
  margin:20px auto;
  background:#fff;
  border-radius:20px;
  padding:22px;
  border:1px solid #ececec;
  box-shadow:0 8px 18px rgba(0,0,0,.05);
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:700;
  background:#111;
  color:#fff;
  cursor:pointer;
}

/* STATUS BOX */
.status-box{
  padding:14px;
  border-radius:12px;
  background:#f6f7fb;
  font-size:13px;
  line-height:1.6;
}

/* PROGRESS */
.progress{
  height:6px;
  background:#eee;
  border-radius:10px;
  margin-top:10px;
}
.progress-bar{
  height:100%;
  width:0%;
  border-radius:10px;
  background:#111;
  transition:0.3s;
}


</style>
</head>

<body>

<!-- HEADER -->
<header>
  <img src="../assets/dynotic-distribution.png">
</header>

<!-- HERO -->
<div class="card" style="text-align:center;">
  <div style="font-size:20px;font-weight:700;margin-bottom:8px">
    Official Artist Channel
  </div>
  <div style="font-size:13px;color:#666;margin-bottom:16px">
    Upgrade channel YouTube kamu jadi Official Artist Channel
  </div>

  <button onclick="goRequestOAC()">Request OAC</button>
</div>

<!-- STATUS -->
<div class="card">
  <div style="font-weight:700;margin-bottom:12px">Your Status</div>

  <div id="statusBox" class="status-box">
    Loading...
  </div>
</div>



<!-- INFO -->
<div class="card">
  <div style="font-weight:700;margin-bottom:10px">What is OAC?</div>
  <div style="font-size:13px;color:#666">
    Official Artist Channel (OAC) adalah fitur YouTube yang menggabungkan semua channel musik kamu menjadi satu profil resmi artist.
  </div>
</div>


<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyBRSkmZXbTPNupefSmjXvlKLDNsaeQ2zag",
      authDomain: "dynopay-2513c.firebaseapp.com",
      databaseURL: "https://dynopay-2513c-default-rtdb.asia-southeast1.firebasedatabase.app"
    });

const db = firebase.database();

firebase.auth().onAuthStateChanged(user=>{
  if(!user) location.href="../login";
  else loadOAC(user.uid);
});

function goRequestOAC(){
  location.href="../oac-request";
}

function loadOAC(uid){
  const box = document.getElementById("statusBox");

  db.ref("oac/" + uid).on("value", snap => {

    if(!snap.exists()){
      box.innerHTML = "Belum ada request OAC";
      return;
    }

    const data = snap.val();
    const list = Object.values(data || {});

    let html = "";

    list
      .sort((a,b)=>b.time - a.time) // terbaru di atas
      .forEach((d, i) => {

        let status = d.status || "pending";
        let color = "#f59e0b";
        let progress = 33;

        let displayStatus = "SUBMITTED";

        if(status === "review") displayStatus = "IN REVIEW";
        else if(status === "approved") displayStatus = "APPROVED";
        else if(status === "rejected") displayStatus = "REJECTED";

        if(status==="review"){
          color="#3b82f6";
          progress=66;
        }
        else if(status==="approved"){
          color="#22c55e";
          progress=100;
        }
        else if(status==="rejected"){
          color="#ef4444";
          progress=100;
        }

        html += `
          <div style="margin-bottom:18px;padding:14px;border-radius:12px;background:#fff;border:1px solid #eee;">
            
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
              <b>${d.artist}</b>
              <span style="font-size:12px;color:#666">
                ${new Date(d.time).toLocaleDateString()}
              </span>
            </div>

            <div style="font-size:13px;margin-bottom:6px;">
              Channel: ${d.channel}
            </div>

            <div style="font-size:12px;margin-bottom:6px;">
              Status: 
              <span style="color:${color};font-weight:600;">
                ${displayStatus}
              </span>
            </div>

            <div class="progress">
              <div class="progress-bar" style="width:${progress}%;background:${color}"></div>
            </div>

          </div>
        `;
      });

    box.innerHTML = html;
  });
}
</script>

</body>
</html>
