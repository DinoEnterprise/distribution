<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password | Dynotic Distribution</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{ box-sizing:border-box; font-family:'Outfit',sans-serif; margin:0; padding:0; }

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(180deg, #e5e7eb, #d1d5db);
  padding:15px;
}

/* CARD */
.container{
  width:100%;
  max-width:420px;
  background:#fff;
  border-radius:28px;
  padding:36px 28px;
  text-align:center;
  border:1px solid rgba(0,0,0,0.05);
  box-shadow: 0 15px 35px rgba(0,0,0,0.08), 0 5px 10px rgba(0,0,0,0.04);
  transition: all 0.3s ease;
}
.container:hover{
  transform: translateY(-4px);
}

/* LOGO */
.logo{ width:80px; margin-bottom:20px; }
h2{ margin-bottom:25px; font-size:24px; font-weight:700; color:#222; }

/* INPUT */
.field{ position:relative; margin-bottom:20px; width:100%; }
input{
  width:100%;
  padding:14px 16px;
  border-radius:12px;
  border:1px solid #ccc;
  font-size:15px;
  outline:none;
  transition:.3s;
}
input:focus{
  border-color:#000;
  box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
}

/* BUTTON */
button{
  letter-spacing:.3px;
  width:100%;
  padding:16px;
  border-radius:14px;
  font-size:16px;
  font-weight:700;
  color:#fff;
  background:#000;
  border:none;
  cursor:pointer;
  transition:.3s;
}
button:hover{ background:#111; }
button:focus{ outline:none; }
button:active{ transform: scale(0.96); }

/* MESSAGE */
#message{
  margin-top:15px;
  font-size:14px;
  min-height:22px;
  transition:.3s;
}

/* LINK BACK */
.back-link{
  display:inline-block;
  margin-top:25px;
  font-size:14px;
  color:#555;
  text-decoration:underline;
  transition:.2s;
}
.back-link:hover{
  color:#000;
}

/* LOADER */
.loader{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,0.9);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:16px;
  color:#111;
  opacity:0;
  pointer-events:none;
  transition:.3s;
}
.loader.active{ opacity:1; pointer-events:auto; }

/* HILANGKAN GARIS BIRU DEFAULT */
input:focus, button:focus, .back-link:focus{ outline:none; }
</style>
</head>

<body>

<div class="container">
  <img src="../assets/dynotic-distribution.png" class="logo">
  <h2>Reset Password</h2>

  <div class="field">
    <input id="email" type="email" placeholder="Enter your email">
  </div>

  <button onclick="resetPassword()">Send Reset Email</button>

  <div id="message"></div>

  <div>
    <a href="login.html" class="back-link">Back to Login</a>
  </div>
</div>

<div class="loader" id="loader">Dynotic Distribution…</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyBRSkmZXbTPNupefSmjXvlKLDNsaeQ2zag",
  authDomain: "dynopay-2513c.firebaseapp.com",
  databaseURL: "https://dynopay-2513c-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const emailInput = document.getElementById("email");
const btn = document.querySelector("button");
const messageEl = document.getElementById("message");
const loader = document.getElementById("loader");

emailInput.addEventListener("input", () => { messageEl.textContent = ""; });

function resetPassword(){
  const email = emailInput.value.trim();
  if(!email){
    messageEl.style.color = "#e53e3e";
    messageEl.textContent = "Please enter your email first";
    return;
  }

  btn.disabled = true;
  loader.classList.add("active");

  firebase.auth().sendPasswordResetEmail(email)
    .then(() => {
      messageEl.style.color = "green";
      messageEl.textContent = "Password reset email sent. Check your inbox!";
      loader.classList.remove("active");
      btn.disabled = false;
    })
    .catch(err => {
      messageEl.style.color = "#e53e3e";
      messageEl.textContent = err.message;
      loader.classList.remove("active");
      btn.disabled = false;
    });
}
</script>

</body>
</html>
