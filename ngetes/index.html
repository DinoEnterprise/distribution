<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Firebase Test</title>
</head>
<body style="font-family:sans-serif;padding:20px">

<h2>🔥 Firebase Debug Test</h2>

<div id="status">Status: Loading...</div>
<pre id="output" style="background:#111;color:#0f0;padding:15px;margin-top:10px;border-radius:10px"></pre>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyBRSkmZXbTPNupefSmjXvlKLDNsaeQ2zag",
  authDomain: "dynopay-2513c.firebaseapp.com",
  databaseURL: "https://dynopay-2513c-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const statusEl = document.getElementById("status");
const outputEl = document.getElementById("output");

firebase.auth().onAuthStateChanged(user => {
  if (!user) {
    statusEl.innerText = "❌ User belum login";
    outputEl.innerText = "Silakan login dulu.";
    return;
  }

  const uid = user.uid;
  statusEl.innerText = "✅ Login berhasil | UID: " + uid;

  // TEST USERS
  firebase.database().ref("users/" + uid)
    .once("value")
    .then(snap => {
      outputEl.innerText += "\n\n=== USERS DATA ===\n";
      outputEl.innerText += JSON.stringify(snap.val(), null, 2);
    })
    .catch(err => {
      outputEl.innerText += "\n\n❌ ERROR USERS:\n" + err;
    });

  // TEST RELEASES
  firebase.database().ref("releases/" + uid)
    .once("value")
    .then(snap => {
      outputEl.innerText += "\n\n=== RELEASES DATA ===\n";
      outputEl.innerText += JSON.stringify(snap.val(), null, 2);
    })
    .catch(err => {
      outputEl.innerText += "\n\n❌ ERROR RELEASES:\n" + err;
    });

  // TEST GLOBAL (opsional)
  firebase.database().ref("releases")
    .limitToFirst(3)
    .once("value")
    .then(snap => {
      outputEl.innerText += "\n\n=== GLOBAL RELEASES (3 DATA) ===\n";
      outputEl.innerText += JSON.stringify(snap.val(), null, 2);
    })
    .catch(err => {
      outputEl.innerText += "\n\n❌ ERROR GLOBAL:\n" + err;
    });

});
</script>

</body>
</html>
