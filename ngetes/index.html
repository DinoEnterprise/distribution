    function uploadFile(file, progressCallback, doneCallback){
  const formData = new FormData();
  formData.append("file", file);

  const xhr = new XMLHttpRequest();
  xhr.open("POST", WORKER_URL, true);

  xhr.upload.onprogress = function(e){
    if(e.lengthComputable){
      const percent = Math.round((e.loaded / e.total) * 100);
      progressCallback(percent);
    }
  };

  xhr.onload = function(){
    if(xhr.status === 200){
      const data = JSON.parse(xhr.responseText);
      if(data.success){
        doneCallback(data.url);
      } else {
        alert("Upload gagal: " + data.error);
        doneCallback(null);
      }
    } else {
      alert("Upload gagal!");
      doneCallback(null);
    }
  };

  xhr.onerror = function(){
    alert("Upload error!");
    doneCallback(null);
  };

  xhr.send(formData);
}

    // Audio & cover listeners upgraded
let uploadListenerAttached = false;

function attachUploadListeners(){
  if(uploadListenerAttached) return;
  uploadListenerAttached = true;

  const audioInput = document.getElementById("audio");
  const coverInput = document.getElementById("cover");
  const previewBtn = document.getElementById("previewBtn");
  const audioWave = document.getElementById("audioWave");
  const audioName = document.getElementById("audioName");
  const coverPreview = document.getElementById("coverPreview");

  let audioUploaded = false;
  let coverUploaded = false;

  function checkAllUploaded(){
    previewBtn.disabled = !(audioUploaded && coverUploaded);
  }

  // AUDIO LISTENER
  audioInput.addEventListener("change", e=>{
    const file = e.target.files[0];
    if(!file) return;

    audioUploaded = false;
    audioName.textContent = file.name;
    audioWave.style.width = "0%";

    uploadFile(
      file,
      percent=>{
        audioWave.style.width = percent + "%";
      },
      url=>{
        if(url){
          audioInput.dataset.url = url;
          audioUploaded = true;
          checkAllUploaded();
        }
      }
    );
  });

  // COVER LISTENER
  coverInput.addEventListener("change", e=>{
    const file = e.target.files[0];
    if(!file) return;

    coverUploaded = false;

    const reader = new FileReader();
    reader.onload = ev=>{
  coverPreview.src = ev.target.result;
  coverPreview.style.display = "block";
  document.getElementById("coverPlaceholder").style.display = "none";
};
    reader.readAsDataURL(file);

    uploadFile(
      file,
      percent=>{},
      url=>{
        if(url){
          coverInput.dataset.url = url;
          coverUploaded = true;
          checkAllUploaded();
        }
      }
    );
  });
}

    function next(n){

if(n===2){

    artist: document.getElementById("artist")?.value,

  });
  if(!stepsData[2]()) return alert("Lengkapi master");
}
      if(n===3){
        const audio=document.getElementById("audio");
        const cover=document.getElementById("cover");
        if(!audio?.dataset.url || !cover?.dataset.url) return alert("Tunggu sampai audio & cover selesai di-upload!");
        loadPreview();
      }
      goto(n+1);
    }

    function back(n){ goto(n-1); }

    function goto(n){
  hideAll();
  document.getElementById("step"+n).hidden=false;

  // 🔥 TAMBAHAN INI
  if(n === 3){
    attachUploadListeners();
  }

  for(let i=1;i<=4;i++) 
    document.getElementById("s"+i).classList.remove("active");

  document.getElementById("s"+n).classList.add("active");
}

const genreOptions = ["Alternatif","Anime","Antiques & Collectibles","Blues","Bossa Nova","Childrens Music",
  "Chill Out","Cristian","Classical","Comedy","Country","Dance","Dancehall","Devotional",
  "Disco","Easy Listening","Educational","Electronic","Fitness & Workout","Folk",

let selectedGenres = [];
let artists = [];

function openArtistDropdown(){
  const dropdown = document.getElementById("artistDropdown");
  dropdown.style.display = "block";
  renderArtistDropdown();
}

function closeArtistDropdown(){
  document.getElementById("artistDropdown").style.display = "none";
}

function renderArtistDropdown(){
  const dropdown = document.getElementById("artistDropdown");
  dropdown.innerHTML = "";

  if(artists.length === 0){
    const div = document.createElement("div");
    div.className="genre-item";
    div.style.color="#888";
    div.textContent="Artist not found";
    dropdown.appendChild(div);
  } else {
    artists.forEach(a=>{
      const div = document.createElement("div");
      div.className="genre-item";
      div.textContent = a;
      div.onclick = ()=>{
        document.getElementById("artist").value = a;
        closeArtistDropdown();
      };
      dropdown.appendChild(div);
    });
  }

  const createBtn = document.createElement("div");
  createBtn.className="genre-item";
  createBtn.style.fontWeight="600";
  createBtn.style.borderTop="1px solid #eee";
  createBtn.textContent="+ Create New Artist";
  createBtn.onclick = openNewArtistModal;

  dropdown.appendChild(createBtn);
}

// Modal Artist
function openNewArtistModal(){
  closeArtistDropdown();
  document.getElementById("artistModal").style.display = "flex";
}

function closeArtistModal(){
  document.getElementById("artistModal").style.display = "none";
}

function addNewArtist(){
  const name = document.getElementById("newArtistName").value.trim();
  const spotify = document.getElementById("newArtistSpotify").value.trim();
  const apple = document.getElementById("newArtistApple").value.trim();

  if(!name) return alert("Artist Name wajib diisi");

  const user = firebase.auth().currentUser;

  db.ref("artists/"+user.uid).push({
    name: name,
    spotify: spotify || "",
    apple: apple || ""
  }).then(()=>{

    artists.push(name);

    document.getElementById("artist").value = name;

    closeArtistModal();
    closeArtistDropdown();

  });
}
function renderGenres(list){
  const dropdown = document.getElementById("genreDropdown");
  dropdown.innerHTML = "";
  list.forEach(g=>{
    const div = document.createElement("div");
    div.className="genre-item";
    div.textContent=g;
    div.onclick=()=>addGenre(g);
    dropdown.appendChild(div);
  });
}

function filterGenres(){
  const val = document.getElementById("genreSearch").value.toLowerCase();
  const filtered = genreOptions.filter(g=> g.toLowerCase().includes(val) && !selectedGenres.includes(g));
  renderGenres(filtered);
}

function showAllGenres(){
  renderGenres(genreOptions.filter(g=>!selectedGenres.includes(g)));
}

function addGenre(genre){
  if(selectedGenres.includes(genre)) return;
  if(selectedGenres.length>=3){
    showGenreNotice("Maximum 3 genres allowed");
    return;
  }
  selectedGenres.push(genre);
  updateGenreTags();
  showAllGenres();
}

function removeGenre(genre){
  selectedGenres = selectedGenres.filter(g=>g!==genre);
  updateGenreTags();
  showAllGenres();
}

function updateGenreTags(){
  const container=document.getElementById("selectedGenres");
  container.innerHTML="";
  selectedGenres.forEach(g=>{
    const tag=document.createElement("div");
    tag.className="genre-tag";
    tag.innerHTML=g + `<span onclick="removeGenre('${g}')">×</span>`;
    container.appendChild(tag);
  });
  document.getElementById("genreSearch").value="";
}

function showGenreNotice(message){
  const notice=document.getElementById("genreNotice");
  const input=document.getElementById("genreSearch");
  notice.textContent=message;
  notice.style.display="block";
  input.classList.add("input-error");
  setTimeout(()=>{
    notice.style.display="none";
    input.classList.remove("input-error");
  },2000);
}

document.addEventListener("click", e=>{
  if(!document.querySelector(".genre-wrapper").contains(e.target)){
    document.getElementById("genreDropdown").innerHTML="";
  }
});

      const text=document.getElementById("btnText");
      const loader=document.getElementById("btnLoader");
      btn.disabled=true; text.style.display="none"; loader.style.display="inline";
      const user=firebase.auth().currentUser;
      if(!user) return;
      let data = {
  type: type.value,
  title: title.value,
  artist: artist.value,
  genre: selectedGenres.join(", "), // <-- ganti ini
  audio: audio.dataset.url,
  cover: cover.dataset.url,
  status: "pending",
  time: Date.now()
};
const spotify = document.getElementById("spotifyUrl");
const apple = document.getElementById("appleId");
const feat = document.getElementById("featuring");

if(spotify?.value) data.spotifyUrl = spotify.value;
if(apple?.value) data.appleId = apple.value;
if(feat?.value) data.featuring = feat.value;
      data.releaseType=releaseType.value; data.version=version.value; data.fullname=fullname.value; data.label=label.value; data.release=release.value;
      db.ref("releases/"+user.uid).push(data).then(()=>location.href="../releases")
        .catch(()=>{ btn.disabled=false; text.style.display="inline"; loader.style.display="none";});
    }

  </script>
</body>
</html>
