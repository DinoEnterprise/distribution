<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Success</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Outfit",sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(180deg, #e5e7eb, #d1d5db);
  padding:15px;
}

/* CARD */
.box{
  width:100%;
  max-width:380px;
  background:#fff;
  border-radius:26px;
  padding:36px 26px;
  text-align:center;
  border:1px solid rgba(0,0,0,0.05);
  box-shadow:0 10px 30px rgba(0,0,0,0.12), 0 30px 60px rgba(0,0,0,0.08);
  animation:enter .6s ease;
}

@keyframes enter{
  from{opacity:0; transform:translateY(40px)}
  to{opacity:1; transform:none}
}

/* ICON */
.icon{
  width:70px;
  margin-bottom:18px;
  opacity:.9;
}

/* TEXT */
h1{
  font-size:22px;
  font-weight:700;
  color:#111;
  margin-bottom:8px;
}

p{
  font-size:14px;
  color:#555;
}

/* BUTTON */
.btn{
  margin-top:20px;
  display:inline-block;
  padding:12px 20px;
  border-radius:12px;
  background:#000;
  color:#fff;
  text-decoration:none;
  font-weight:600;
  transition:.2s;
}

.btn:hover{
  background:#111;
  transform:translateY(-1px);
}
</style>
</head>

<body>

<div class="box">
  <img src="../assets/email_icon_black.png" class="icon">

  <h1>Submitted</h1>
  <p>Please wait for our response via email.</p>

  <a href="../register" class="btn">Back</a>
</div>

</body>
</html>
