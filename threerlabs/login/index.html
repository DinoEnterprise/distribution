<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThreeR Login</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{ box-sizing:border-box; font-family:'Outfit',sans-serif; margin:0; padding:0; }

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(180deg, #e5e7eb, #d1d5db);
  padding:15px;
}

.container{
  width:100%;
  max-width:420px;
  background:#fff;
  border-radius:26px;
  padding:32px 26px;
  text-align:center;
  border:1px solid rgba(0,0,0,0.05);
  box-shadow:0 10px 30px rgba(0,0,0,0.12), 0 30px 60px rgba(0,0,0,0.08);
  animation:enter .6s ease;
  display:flex;
  flex-direction:column;
  gap:16px;
}

@media (hover:hover){
  .container:hover{ transform:translateY(-3px); transition:.3s; }
}

@keyframes enter{
  from{opacity:0; transform:translateY(40px)}
  to{opacity:1; transform:none}
}

.logo{ width:90px; margin:0 auto 12px; }
.brand-name{ font-size:28px; font-weight:700; color:#222; }
.brand-tagline{ font-size:12px; color:#555; margin-bottom:20px; }

.field{ position:relative; margin-bottom:15px; }
input{
  width:100%;
  padding:14px 44px 14px 16px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:15px;
  outline:none;
  transition:.2s;
}
input:focus{
  border:1px solid #111;
  box-shadow:0 0 0 3px rgba(0,0,0,0.08);
}

.toggle{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:18px;
}

button{
  width:100%;
  padding:15px;
  border-radius:14px;
  font-size:16px;
  font-weight:700;
  color:#fff;
  background:#000;
  border:1px solid #000;
  cursor:pointer;
}
button:hover{ background:#111; }
button:active{ transform:scale(.96); }

#error{
  margin-top:10px;
  font-size:14px;
  color:#e53e3e;
  min-height:20px;
}

.loader{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.9);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:16px;
  color:#111;
  opacity:0;
  pointer-events:none;
  transition:.3s;
}
.loader.active{ opacity:1; pointer-events:auto; }

.fade-out{ animation:exit .5s ease forwards; }
@keyframes exit{ to{opacity:0; transform:scale(.95);} }
</style>
</head>
<body>

<div class="container" id="card">
  <img src="../assets/3r-dist.png" class="logo">
  <h2 class="brand-name">ThreeR Login</h2>
  <p class="brand-tagline">Powered by Dynotic</p>

  <div class="field">
    <input id="email" type="email" placeholder="Email">
  </div>

  <div class="field">
    <input id="pass" type="password" placeholder="Password">
    <div class="toggle" onclick="togglePass()">𖠂</div>
  </div>

  <div style="text-align:right; margin-bottom:15px;">
    <a href="forgot-password" style="font-size:14px; color:#555;">Forgot password?</a>
  </div>

  <button onclick="login()">Login</button>
  <div id="error"></div>
</div>

<div class="loader" id="loader">Signing in...</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB_URL"
});

const db = firebase.database();
const errorEl = document.getElementById("error");
const emailInput = document.getElementById("email");
const passInput = document.getElementById("pass");
const btn = document.querySelector("button");
const loader = document.getElementById("loader");

emailInput.addEventListener("input", ()=> errorEl.textContent="");
passInput.addEventListener("input", ()=> errorEl.textContent="");

function togglePass(){
  passInput.type = passInput.type==="password" ? "text" : "password";
}

function login(){
  if(btn.disabled) return;

  const email = emailInput.value.trim();
  const pass = passInput.value.trim();

  if(!email || !pass){
    errorEl.textContent = "Email and password are required";
    return;
  }

  loader.classList.add("active");
  btn.disabled = true;
  btn.textContent = "Signing in...";

  firebase.auth()
    .setPersistence(firebase.auth.Auth.Persistence.LOCAL)
    .then(()=> firebase.auth().signInWithEmailAndPassword(email, pass))
    .then(userCredential=>{
      const user = userCredential.user;
      return db.ref("users/" + user.uid).once("value");
    })
    .then(snapshot=>{
      const data = snapshot.val();

      if(!data || data.status !== "active"){
        firebase.auth().signOut();
        loader.classList.remove("active");
        errorEl.textContent = "Account is inactive. Contact admin";
        btn.disabled = false;
        btn.textContent = "Login";
        return;
      }

      const user = firebase.auth().currentUser;
      db.ref("users/" + user.uid + "/lastLogin").set(Date.now());

      document.getElementById("card").classList.add("fade-out");

      setTimeout(()=> window.location.replace("../home"), 600);
    })
    .catch(error=>{
      loader.classList.remove("active");

      switch(error.code){
        case "auth/user-not-found":
          errorEl.textContent="User not found"; break;
        case "auth/wrong-password":
          errorEl.textContent="Incorrect password"; break;
        case "auth/invalid-email":
          errorEl.textContent="Invalid email"; break;
        default:
          errorEl.textContent="Login failed";
      }

      btn.disabled = false;
      btn.textContent = "Login";
    });
}

document.addEventListener("keydown", e=>{
  if(e.key==="Enter") login();
});

firebase.auth().onAuthStateChanged(user=>{
  if(user) window.location.replace("../home");
});
</script>

</body>
</html>
