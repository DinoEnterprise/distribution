<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynotic Registration</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif}
body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(180deg, #e5e7eb, #d1d5db);
  padding:15px;
}
.container{
  transition: all .3s ease;
  width:100%;
  max-width:420px;
  background:#fff;
  border-radius:26px;
  padding:32px 26px;
  text-align:center;
  border:1px solid rgba(0,0,0,0.05);
  box-shadow:0 10px 30px rgba(0,0,0,0.12), 0 30px 60px rgba(0,0,0,0.08);
  animation:enter .6s ease;
}
.container:hover{ transform:translateY(-3px); transition:.3s; }
@keyframes enter{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:none}}
#toast {
  position: fixed;
  top: 20px; /* dari atas layar, bukan bawah */
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: #667eea;
  color: #fff;
  padding: 14px 25px;
  border-radius: 12px;
  font-weight: 600;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s, transform 0.4s;
  z-index: 9999;
}
.toggle {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  font-size: 18px;
  user-select: none;
  padding: 4px;
  border-radius: 6px;
  transition: .2s;
}
.fade-out{ animation:exit .5s ease forwards; }
@keyframes exit{ to{opacity:0; transform:scale(.95);} }
.logo{width:70px;margin-bottom:16px}
h2{margin-bottom:20px;font-size:22px;font-weight:700;color:#222}
.field{position:relative;margin-bottom:15px;width:100%}
input{width:100%;padding:14px 16px;border-radius:12px;border:1px solid #ddd;font-size:15px;outline:none;transition:.2s}
input:focus{
  border:1px solid #111;
  box-shadow:0 0 0 3px rgba(0,0,0,0.08);
}
button{
  cursor:pointer;
  width:100%;
  padding:15px;
  border-radius:14px;
  font-size:16px;
  font-weight:700;
  color:#fff;
  background:#000;
  border:1px solid #000;
  cursor:pointer;
  transition:.2s;
  margin-top:10px;
}
button:disabled{
  cursor:not-allowed;
  opacity:0.7;
}
button:hover{
  background:#111;
  transform:translateY(-1px);
}
button:focus, button:active{ outline:2px solid #000; }
button:active{ transform:scale(.96); }
#error{margin-top:10px;font-size:14px;color:#e53e3e;min-height:20px}
.loader{position:fixed;inset:0;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#111;opacity:0;pointer-events:none;transition:.3s}
.loader.active{opacity:1;pointer-events:auto}
</style>
</head>
<body>
  
<div class="loader" id="loader">Sending…</div>
<div id="toast"></div>
<div class="container" id="card">
  <img src="../assets/dynotic-distribution.png" class="logo">
<h2>Dynotic Registration</h2>
  <div class="field"><input id="fullname" type="text" placeholder="Full Name"></div>
  <div class="field"><input id="email" type="email" placeholder="Email"></div>
<div class="field">
  <input id="password" type="password" placeholder="Password">
  <div class="toggle" id="eye" tabindex="0" onclick="togglePass()">𖠂</div>
</div>
  <div class="field"><input id="youtube" type="text" placeholder="YouTube"></div>
  <div class="field"><input id="instagram" type="text" placeholder="Instagram"></div>

  <button onclick="register()">Register</button>
  <div id="error"></div>
</div>

<script>
  function isURL(url, type) {
  if (!url) return false;
  let pattern;
  
  if(type === "youtube") {
    // Harus youtube.com atau youtu.be
    pattern = /^(https?:\/\/)?(www\.)?(youtube\.com|youtu\.be)\/.+$/;
  } else if(type === "instagram") {
    // Harus instagram.com
    pattern = /^(https?:\/\/)?(www\.)?instagram\.com\/.+$/;
  } else {
    // generic
    pattern = /^(https?:\/\/)?([\w-]+\.)+[\w-]{2,}\/?.*$/;
  }
  return pattern.test(url);
}
 function togglePass() {
  const p = document.getElementById("password");
  const eye = document.getElementById("eye");

  if (p.type === "password") {
    p.type = "text";
    eye.textContent = "⌒"; // mata terbuka
  } else {
    p.type = "password";
    eye.textContent = "𖠂"; // mata tertutup
  }
} 
function showToast(message) {
  const toast = document.getElementById("toast");
  toast.textContent = message;
  toast.style.opacity = "1";
  toast.style.transform = "translateX(-50%) translateY(0)";
  toast.style.pointerEvents = "auto";

  setTimeout(() => {
    toast.style.opacity = "0";
    toast.style.transform = "translateX(-50%) translateY(-20px)";
    toast.style.pointerEvents = "none";
  }, 3000);
}
function register(){
  const fullname = document.getElementById("fullname").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const youtube = document.getElementById("youtube").value.trim();
  const instagram = document.getElementById("instagram").value.trim();
  const errorEl = document.getElementById("error");
  const btn = document.querySelector("button");
btn.disabled = true;
btn.textContent = "Sending...";

  errorEl.textContent = "";

  // Reset semua input border
const inputs = [ "fullname", "email", "password", "youtube", "instagram" ];
inputs.forEach(id => {
  document.getElementById(id).style.border = "1px solid #ddd"; // default
});

// Validasi semua field wajib diisi
let hasError = false;
inputs.forEach(id => {
  const val = document.getElementById(id).value.trim();
  if (!val) {
    document.getElementById(id).style.border = "2px solid #e53e3e"; // merah
    hasError = true;
  }
});
if (hasError) {
  errorEl.textContent = "Please fill in all required fields";

  btn.disabled = false;
  btn.textContent = "Register";

  return;
}

// Validasi semua field wajib diisi
if(!isURL(youtube, "youtube")) {
  document.getElementById("youtube").style.border = "2px solid #e53e3e";
  errorEl.textContent = "Please enter a valid YouTube URL";

  btn.disabled = false;
  btn.textContent = "Register";

  return;
}

// Validasi semua field wajib diisi
if(!isURL(instagram, "instagram")) {
  document.getElementById("instagram").style.border = "2px solid #e53e3e";
  errorEl.textContent = "Please enter a valid Instagram URL";

  btn.disabled = false;
  btn.textContent = "Register";

  return;
}
  const data = {
    fullname, email, password, youtube, instagram,
    timestamp: new Date().toISOString()
  };

  document.getElementById("loader").classList.add("active");
fetch("https://dynotic-bot.dynotic-bot.workers.dev/", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({ fullname, email, password, youtube, instagram })
})
.then(res => res.json())
.then(data => {
  document.getElementById("loader").classList.remove("active");
if (data.success) {
  document.getElementById("card").classList.add("fade-out");
  setTimeout(() => {
    window.location.href = "../success";
  }, 500);
}
else {
    errorEl.textContent = "Failed to send registration. Try again.";

    btn.disabled = false;
    btn.textContent = "Register";
}
})
.catch(err => {
  document.getElementById("loader").classList.remove("active");
  errorEl.textContent = "Failed to send registration. Try again.";

  btn.disabled = false;
  btn.textContent = "Register";

  console.error(err);
});
}
</script>

</body>
</html>
